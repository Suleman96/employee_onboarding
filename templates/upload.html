<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Employee</title>
    <style>
        body {font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: linear-gradient(145deg, #f1f5fb 0%, #e1e9f8 100%);color: #2a3b57;}
        
        .container { max-width: 940px; width: 92%; margin: 30px auto; background: #ffffff; border-radius: 14px;
            box-shadow: 0 12px 28px rgba(30, 47, 80, 0.16);padding: 24px 26px 32px;
            border: 1px solid #d6e1f9;        }
        h1 {
            margin: 0 0 20px; font-size: 1.9rem;color: #1f3c88;letter-spacing: 0.02em;}
        form fieldset {
            border: 1px solid #d6e1f9; border-radius: 10px;padding: 16px 20px 20px;margin-bottom: 12px; background: #f8fbff;}
        form legend {font-weight: 700;color: #15418f; padding: 0 8px;}
        .form-grid {display: grid;gap: 12px;}
        .form-grid fieldset {padding: 14px 16px;}
        .form-grid .field {display: flex; flex-direction: column; gap: 4px;}
        .form-grid .field + .field {margin-top: 0;}
        .form-grid fieldset {grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); display: grid; row-gap: 8px; column-gap: 14px; }
        .form-grid .full-width {
            grid-column: 1 / -1;
        }
        .btn-submit {
            margin-top: 10px;
            width: 200px;
            justify-self: center;
            background: linear-gradient(120deg, #1f3c88, #3a68c2);
        }
        label {
            font-size: 0.95rem;
            display: block;
            margin-bottom: 6px;
            color: #324462;
        }
        input[type="text"], input[type="email"], input[type="tel"], input[type="date"], input[type="number"], select {
            width: 100%;
            max-width: 350px;
            min-height: 30px;
            padding: 8px 10px;
            border: 1px solid #aac2ea;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #1f3a69;
            background: #fbfdff;
            margin-bottom: 10px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        input:focus, select:focus {
            border-color: #4b82ff;
            box-shadow: 0 0 0 2px rgba(75, 130, 255, 0.16);
        }
        button[type="submit"] {
            width: 100%;
            max-width: 260px;
            display: block;
            margin: 8px auto 0;
            padding: 11px 16px;
            border: none;
            border-radius: 10px;
            background-color: #1f3c88;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }
        button[type="submit"]:hover {
            background-color: #16306d;
            transform: translateY(-1px);
        }
        .note {
            text-align: center;
            margin-top: 16px;
            color: #51698c;
            font-size: 0.9rem;
        }
        @media (max-width: 768px) {
            .container { width: 96%; padding: 18px; }
            h1 { font-size: 1.6rem; }
            .form-grid fieldset { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
    <h1>Create New Employee</h1>

    <form action="/employees/new" method="post" class="form-grid">

        <fieldset>
            <legend><strong>Basic Information</strong></legend>
            <div class="field"><label>First Name</label><input type="text" name="first_name"></div>
            <div class="field"><label>Last Name</label><input type="text" name="last_name"></div>
            <div class="field"><label>Gender</label><select name="gender"><option value="">--Choose--</option><option value="male">male</option><option value="female">female</option><option value="non-binary">non-binary</option><option value="unspecified">unspecified</option></select></div>
            <div class="field"><label>Date of Birth</label><input type="date" name="date_of_birth"></div>
        </fieldset>

        <fieldset>
            <legend><strong>Birth & Origin</strong></legend>
            <div class="field"><label>Place of Birth</label><input type="text" name="place_of_birth"></div>
            <div class="field"><label>Country of Birth</label><input type="text" name="country_of_birth"></div>
            <div class="field full-width"><label>Nationality</label><input type="text" name="nationality" list="nationality-list"></div>
        </fieldset>

        <fieldset>
            <legend><strong>Identity Documents</strong></legend>
            <div class="field"><label>Ausweis Number</label><input type="text" name="ausweis_number"></div>
            <div class="field"><label>Reise Pass Number</label><input type="text" name="reise_pass_number"></div>
        </fieldset>

        <fieldset>
            <legend><strong>Contact</strong></legend>
            <div class="field"><label>Phone</label><input type="tel" name="phone"></div>
            <div class="field"><label>Email</label><input type="email" name="email"></div>
        </fieldset>

        <fieldset>
            <legend><strong>Address</strong></legend>
            <div class="field"><label>Street and House Number</label><input type="text" name="street_and_house_number"></div>
            <div class="field"><label>ZIP Code</label><input type="text" name="zip_code"></div>
            <div class="field"><label>City</label><input type="text" name="city"></div>
            <div class="field full-width"><label>Country of stay</label><input type="text" name="country" value="Deutschland"></div>
        </fieldset>

        <fieldset>
            <legend><strong>Health Insurance</strong></legend>
            <div class="field"><label>Krankenkasse</label><input type="text" name="krankenkasse"></div>
            <div class="field"><label>Krankenkasse Nummer</label><input type="text" name="krankenkasse_nummer"></div>
        </fieldset>

        <fieldset>
            <legend><strong>Tax & Financial</strong></legend>
            <div class="field"><label>Steuer ID</label><input type="text" name="steuer_id"></div>
            <div class="field"><label>Steuerklasse</label><input type="number" name="steuerklasse" min="1" max="6"></div>
            <div class="field"><label>Sozialversicherungsnummer</label><input type="text" name="sozialversicherungsnummer"></div>
        </fieldset>

        <fieldset>
            <legend><strong>Banking</strong></legend>
            <div class="field"><label>Bank Name</label><input type="text" name="bank_name"></div>
            <div class="field"><label>BIC</label><input type="text" name="bank_bic"></div>
            <div class="field"><label>Bank Account Holder</label><input type="text" name="bank_account_holder"></div>
            <div class="field full-width"><label>IBAN</label><input type="text" name="bank_iban"></div>
        </fieldset>

        <fieldset>
            <legend><strong>Employment</strong></legend>
            <div class="field"><label>Start Date</label><input type="date" name="start_date"></div>
            <div class="field"><label>Contract Type</label><input type="text" name="contract_type" list="contract-types"></div>
            <div class="field"><label>End Date</label><input type="date" name="end_date"></div>
            <div class="field"><label>Disabled</label><input type="text" name="disabled" list="disabled-options"></div>
            <div class="field full-width"><label>Status</label><select name="status"><option value="draft" selected>draft</option><option value="under_review">under_review</option><option value="approved">approved</option></select></div>
            <div class="field full-width"><label>Ordio ID</label><input type="text" name="ordio_id"></div>
        </fieldset>

        <button type="submit" class="btn-submit">Save Employee</button>
    </form>

    <datalist id="contract-types">
        <option value="permanent">
        <option value="temporary">
        <option value="minijob">
        <option value="internship">
        <option value="freelance">
    </datalist>
